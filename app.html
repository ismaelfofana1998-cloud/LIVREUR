<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Mes missions — IKMS</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0B0E14">
<link rel="stylesheet" href="./assets/css/theme.css">
<link rel="stylesheet" href="./assets/css/livreur.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="identite">
      <span class="nom" id="topbar-nom">Chargement…</span>
      <a class="lien-hub" id="lien-hub" href="#" target="_blank" rel="noopener" hidden>📍 <span id="lien-hub-texte">Itinéraire vers mon hub</span></a>
      <span class="hub" id="topbar-hub"></span>
    </div>
    <div class="statut-connexion">
      <span class="point" id="point-connexion"></span>
      <span id="libelle-connexion">En ligne</span>
    </div>
    <button class="btn-cloche" id="btn-notifications" type="button" aria-label="Notifications">
      🔔<span class="bulle-cloche" id="bulle-notifications" hidden>0</span>
    </button>
    <button class="btn-deconnexion" id="btn-deconnexion" type="button">Quitter</button>
  </header>

  <div class="bandeau-defilant" aria-hidden="true">
    <div class="bandeau-piste">
      <div class="bandeau-rangee">
        <img src="./assets/images/bandeau-1.webp" alt="">
        <img src="./assets/images/bandeau-2.webp" alt="">
        <img src="./assets/images/bandeau-3.webp" alt="">
      </div>
      <div class="bandeau-rangee">
        <img src="./assets/images/bandeau-1.webp" alt="">
        <img src="./assets/images/bandeau-2.webp" alt="">
        <img src="./assets/images/bandeau-3.webp" alt="">
      </div>
    </div>
  </div>

  <section class="compteur" aria-label="Compteur du jour">
    <div class="compteur-titre">Aujourd'hui</div>
    <div class="compteur-grille">
      <div class="compteur-cadran">
        <div class="compteur-chiffre" id="cpt-ramassages">--</div>
        <div class="compteur-label">Ramassages</div>
      </div>
      <div class="compteur-cadran">
        <div class="compteur-chiffre" id="cpt-livraisons">--</div>
        <div class="compteur-label">Livraisons</div>
      </div>
      <div class="compteur-cadran">
        <div class="compteur-chiffre gains" id="cpt-gains">--</div>
        <div class="compteur-label">FCFA livrés</div>
      </div>
    </div>
  </section>

  <main class="contenu" id="contenu">
    <div class="chargement">Chargement de tes missions…</div>
  </main>

  <nav class="onglets" aria-label="Navigation missions">
    <button class="onglet" data-onglet="A_RAMASSER" aria-current="true" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V21H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
      </span>
      <span class="onglet-libelle">À ramasser</span>
      <span class="onglet-badge" id="badge-ramasser" hidden>0</span>
    </button>
    <button class="onglet" data-onglet="A_DEPOSER" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      </span>
      <span class="onglet-libelle">À déposer</span>
      <span class="onglet-badge" id="badge-deposer" hidden>0</span>
    </button>
    <button class="onglet" data-onglet="AU_HUB" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V21H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
      </span>
      <span class="onglet-libelle">Au hub</span>
      <span class="onglet-badge" id="badge-hub" hidden>0</span>
    </button>
    <button class="onglet" data-onglet="A_LIVRER" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/><path d="M3 5h2l2.6 12.4a1 1 0 0 0 1 .8h9.7a1 1 0 0 0 1-.8L21 8H6"/></svg>
      </span>
      <span class="onglet-libelle">À livrer</span>
      <span class="onglet-badge" id="badge-livrer" hidden>0</span>
    </button>
    <button class="onglet" data-onglet="RETOURS" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </span>
      <span class="onglet-libelle">Retours</span>
      <span class="onglet-badge" id="badge-retours" hidden>0</span>
    </button>
  </nav>

</div>

<script src="./assets/js/config.public.js"></script>
<script type="module" src="./assets/js/app.js"></script>
</body>
</html>
